<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d7a46" />

    <!-- Primary SEO -->
    <title>Bezel | Free LinkedIn Profile Frame Generator</title>

      "@context": "https://schema.org",
